# CI: lint, test, build. On push to main: build/push image to GHCR, then SSH deploy (pull + up, no git on server).
#
# Required repository Secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST           — VPS hostname or IP
#   SSH_USER           — SSH login (docker group or sudo for docker compose)
#   SSH_PRIVATE_KEY           — PEM private key matching authorized_keys on the server
#   SSH_PRIVATE_KEY_PASSPHRASE — Optional: only if your key file is passphrase-protected
#   SSH_DEPLOY_PATH    — absolute path to a directory that contains `docker-compose.prod.yml` and `.env` (no git clone required)
# Optional Secrets (only if the GHCR package is private):
#   GHCR_USERNAME       — GitHub username for docker login on the server
#   GHCR_PULL_TOKEN     — PAT with read:packages
# Notes:
#   — First-time server setup: copy `docker-compose.prod.yml` and `.env` into SSH_DEPLOY_PATH once.
#   — Make the GHCR package public (Packages → package → Package settings) OR set GHCR_* secrets so the server can pull.
#   — Custom SSH port: add `port: N` under `with:` in the Deploy step (appleboy/ssh-action).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  push-image:
    name: Build and push image to GHCR
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Registry image URL
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):main" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    needs: push-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH (pull image, restart stack)
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PRIVATE_KEY_PASSPHRASE }}
          envs: GHCR_USERNAME,GHCR_PULL_TOKEN
          command_timeout: 20m
          script: |
            set -euo pipefail
            DEPLOY="${{ secrets.SSH_DEPLOY_PATH }}"
            cd "$DEPLOY"
            if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
